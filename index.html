<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BFD Shanghai 26 Check-In</title>

<style>
body { font-family: Arial; text-align: center; margin-top: 50px; background:#f9f9f9; }
.logo { max-width:150px; margin-bottom:20px; }
input, button { padding:10px; margin:10px; width:220px; border-radius:5px; }
button { background:#3498db; color:white; border:none; cursor:pointer; }
#retry { display:none; }
</style>
</head>

<body>

<div id="paused" style="display:none;"></div>

<div id="app">
  <img class="logo" src="https://242329549.fs1.hubspotusercontent-na2.net/hubfs/242329549/crm-properties-file-values/Shanghai%20Final%20Logo.png">
  <h1 id="title">BFD Shanghai 26 Check-In</h1>
  <h2 id="dayLabel"></h2>

  <form id="form">
    <input type="text" id="fname" placeholder="First Name" required>
    <input type="text" id="lname" placeholder="Last Name" required><br>
    <button type="submit">Continue</button>
  </form>

  <button id="retry">Retry GPS</button>
  <p id="status"></p>
</div>

<script>
// -----------------------
// CONFIG
// -----------------------
const venueLat = 31.133050;
const venueLon = 121.611800;
const allowedRadius = 200; // meters, larger to cover uncertainty + indoor GPS
const webhookURL = "https://hook.eu1.make.com/pdz3obto9me2epspeq6iyq3yfjh5o1ou";

// -----------------------
// GCJ-02 Conversion (China)
// -----------------------
function wgs84togcj02(lng, lat){
    const pi = 3.14159265358979324;
    const a = 6378245.0;
    const ee = 0.00669342162296594323;

    function transformLat(x, y){
        let ret = -100 + 2*x + 3*y + 0.2*y*y + 0.1*x*y + 0.2*Math.sqrt(Math.abs(x));
        ret += (20*Math.sin(6*x*pi) + 20*Math.sin(2*x*pi))*2/3;
        ret += (20*Math.sin(y*pi) + 40*Math.sin(y/3*pi))*2/3;
        ret += (160*Math.sin(y/12*pi) + 320*Math.sin(y*pi/30))*2/3;
        return ret;
    }

    function transformLng(x, y){
        let ret = 300 + x + 2*y + 0.1*x*x + 0.1*x*y + 0.1*Math.sqrt(Math.abs(x));
        ret += (20*Math.sin(6*x*pi) + 20*Math.sin(2*x*pi))*2/3;
        ret += (20*Math.sin(x*pi) + 40*Math.sin(x/3*pi))*2/3;
        ret += (150*Math.sin(x/12*pi) + 300*Math.sin(x/30*pi))*2/3;
        return ret;
    }

    let dLat = transformLat(lng - 105, lat - 35);
    let dLng = transformLng(lng - 105, lat - 35);
    const radLat = lat / 180 * pi;
    let magic = Math.sin(radLat);
    magic = 1 - ee * magic * magic;
    const sqrtMagic = Math.sqrt(magic);
    dLat = (dLat * 180) / ((a * (1 - ee)) / (magic * sqrtMagic) * pi);
    dLng = (dLng * 180) / (a / sqrtMagic * Math.cos(radLat) * pi);
    return [lng + dLng, lat + dLat];
}

const [venueLonGCJ, venueLatGCJ] = wgs84togcj02(venueLon, venueLat);

// -----------------------
// Haversine formula
// -----------------------
function getDistance(lat1, lon1, lat2, lon2){
    const R = 6371000; // meters
    const toRad = deg => deg * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
}

// -----------------------
// EVENT SCHEDULE
// -----------------------
const eventSchedule = [
  { day: 0, label:"Day 0", date:"2026-04-08", start:{hour:1,minute:35}, end:{hour:20,minute:0} },
  { day: 1, label:"Day 1", date:"2026-04-11", start:{hour:14,minute:0}, end:{hour:18,minute:0} },
  { day: 2, label:"Day 2", date:"2026-04-12", start:{hour:14,minute:0}, end:{hour:18,minute:0} },
  { day: 3, label:"Day 3", date:"2026-04-14", start:{hour:14,minute:0}, end:{hour:18,minute:0} }
];

let currentEvent = null;

// -----------------------
// ACCESS CONTROL
// -----------------------
function checkAccess(){
    const now = new Date();
    const sh = new Date(now.toLocaleString("en-US",{timeZone:"Asia/Shanghai"}));
    const today = sh.toISOString().split("T")[0];
    const minutes = sh.getHours()*60 + sh.getMinutes();
    currentEvent = eventSchedule.find(e => e.date === today);

    if(!currentEvent){
        block("Check-In Not Available Now.");
        return;
    }

    const start = currentEvent.start.hour*60 + currentEvent.start.minute;
    const end = currentEvent.end.hour*60 + currentEvent.end.minute;

    if(minutes >= start && minutes < end){
        document.getElementById("app").style.display="block";
        document.getElementById("paused").style.display="none";
        const labelText = currentEvent.label ? `${currentEvent.label} - ` : "";
        document.getElementById("dayLabel").textContent = `${labelText}${currentEvent.date}`;
    } else {
        block(`Available ${currentEvent.start.hour}:${String(currentEvent.start.minute).padStart(2,'0')} - ${currentEvent.end.hour}:${String(currentEvent.end.minute).padStart(2,'0')}`);
    }
}

function block(msg){
    document.getElementById("app").style.display="none";
    const p=document.getElementById("paused");
    p.style.display="block";
    p.innerHTML=`<h1>We’re currently between sessions.</h1><h3>We’ll be ready to greet you at the next check-in time!</h3><p>${msg}</p>`;
}

// -----------------------
// GPS + FORM SUBMIT
// -----------------------
const form = document.getElementById("form");
const retry = document.getElementById("retry");
const status = document.getElementById("status");
const fnameEl = document.getElementById("fname");
const lnameEl = document.getElementById("lname");

form.addEventListener("submit", e => { e.preventDefault(); startGPS(); });
retry.onclick = () => { retry.style.display="none"; startGPS(); };

function startGPS(){
    const fname = fnameEl.value.trim();
    const lname = lnameEl.value.trim();
    if(!fname || !lname){ alert("Enter name"); return; }

    status.textContent = "Checking location...";
    navigator.geolocation.getCurrentPosition(success, fail, {enableHighAccuracy:true});

    function success(pos){
        let lat = pos.coords.latitude;
        let lon = pos.coords.longitude;
        [lon, lat] = wgs84togcj02(lon, lat); // convert user location to GCJ-02

        const dist = getDistance(lat, lon, venueLatGCJ, venueLonGCJ);

        if(dist <= allowedRadius){
            fetch(webhookURL,{
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body: JSON.stringify({
                    fname, lname,
                    day: currentEvent.day,
                    action: "check-in",
                    lat, lon,
                    timestamp: new Date().toISOString()
                })
            }).then(()=>{
                document.body.innerHTML = `
                    <h1>Check-In Complete</h1>
                    <p>Thank you ${fname} ${lname}!</p>
                `;
            }).catch(()=>{ alert("Error sending data. Try again."); });
        } else {
            alert("We couldn’t verify that you are at the event venue.");
            retry.style.display = "inline-block";
        }
    }

    function fail(){
        alert("Enable location services and try again.");
        retry.style.display = "inline-block";
    }
}

// -----------------------
checkAccess();
setInterval(checkAccess, 30000);
</script>

</body>
</html>
