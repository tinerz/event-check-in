<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BFD Shanghai 26 Check-Out</title>

<style>
body { font-family: Arial; text-align: center; margin-top: 50px; background:#f9f9f9; }
.logo { max-width:150px; margin-bottom:20px; }
input, button { padding:10px; margin:10px; width:220px; border-radius:5px; }
button { background:#3498db; color:white; border:none; cursor:pointer; }
#retry { display:none; }
</style>
</head>

<body>

<div id="paused" style="display:none;"></div>

<div id="app">
  <img class="logo" src="https://242329549.fs1.hubspotusercontent-na2.net/hubfs/242329549/crm-properties-file-values/Shanghai%20Final%20Logo.png">
  <h1 id="title">BFD Shanghai 26 Check-Out</h1>
  <h2 id="dayLabel"></h2>

  <form id="form">
    <input type="text" id="fname" placeholder="First Name" required>
    <input type="text" id="lname" placeholder="Last Name" required><br>
    <button type="submit">Continue</button>
  </form>

  <button id="retry">Retry GPS</button>
  <p id="status"></p>
</div>

<script>
// -----------------------
// CONFIG
// -----------------------
const venueLat = 31.1436;
const venueLon = 121.6625;
const allowedRadius = 0.03;
const webhookURL = "https://hook.eu1.make.com/YOUR_WEBHOOK";

// -----------------------
// Helpers
// -----------------------
function formatTime(t){
  return `${String(t.hour).padStart(2,'0')}:${String(t.minute).padStart(2,'0')}`;
}

function formatDatePretty(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString("en-US", { month:"short", day:"2-digit", year:"numeric" }).replace(",", "");
}

// Haversine formula
function getDistance(lat1,lon1,lat2,lon2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

// -----------------------
// EVENT SCHEDULE (Actual + Test Day)
// -----------------------
const eventSchedule = [
  { day: 0, label:"Day 0", date:"2026-04-02", start:{hour:14,minute:35}, end:{hour:10,minute:40} }, // Test day
  { day: 1, label:"Day 1", date:"2026-04-11", start:{hour:14,minute:0}, end:{hour:18,minute:0} },
  { day: 2, label:"Day 2", date:"2026-04-12", start:{hour:14,minute:0}, end:{hour:18,minute:0} },
  { day: 3, label:"Day 3", date:"2026-04-14", start:{hour:14,minute:0}, end:{hour:18,minute:0} }
];

let currentEvent = null;

// -----------------------
// ACCESS CONTROL
// -----------------------
function checkAccess(){
  const now = new Date();
  const sh = new Date(now.toLocaleString("en-US",{timeZone:"Asia/Shanghai"}));

  const today = sh.toISOString().split("T")[0];
  const minutes = sh.getHours()*60 + sh.getMinutes();

  currentEvent = eventSchedule.find(e => e.date === today);

  if(!currentEvent){
    block("Check-Out not available today.");
    return;
  }

  const start = currentEvent.start.hour*60 + currentEvent.start.minute;
  const end = currentEvent.end.hour*60 + currentEvent.end.minute;

  if(minutes >= start && minutes < end){
    document.getElementById("app").style.display="block";
    document.getElementById("paused").style.display="none";

    // Only show label if it exists (skip empty label for Apr 2)
    const labelText = currentEvent.label ? `${currentEvent.label} - ` : "";
    document.getElementById("dayLabel").textContent =
      `${labelText}${formatDatePretty(currentEvent.date)}`;
  } else {
    block(`Available ${formatTime(currentEvent.start)} - ${formatTime(currentEvent.end)}`);
  }
}

function block(msg){
  document.getElementById("app").style.display="none";
  const p=document.getElementById("paused");
  p.style.display="block";
  p.innerHTML=`<h1>Check-Out Closed</h1><p>${msg}</p>`;
}

// -----------------------
// GPS + SUBMIT
// -----------------------
const form = document.getElementById("form");
const retry = document.getElementById("retry");
const status = document.getElementById("status");
const fnameEl = document.getElementById("fname");
const lnameEl = document.getElementById("lname");

form.addEventListener("submit", e => { e.preventDefault(); startGPS(); });
retry.onclick = () => { retry.style.display="none"; startGPS(); };

function startGPS(){
  const fname = fnameEl.value.trim();
  const lname = lnameEl.value.trim();
  if(!fname || !lname){ alert("Enter name"); return; }

  status.textContent = "Checking location...";

  navigator.geolocation.getCurrentPosition(success, fail, {enableHighAccuracy:true});

  function success(pos){
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    const dist = getDistance(lat, lon, venueLat, venueLon);

    if(dist <= allowedRadius){
      fetch(webhookURL,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          fname, lname,
          day: currentEvent.day,
          action: "check-out",
          lat, lon,
          timestamp: new Date().toISOString()
        })
      }).then(()=>{
        document.body.innerHTML = `
          <h1>Check-Out Complete</h1>
          <p>Thank you ${fname} ${lname}!</p>
        `;
      }).catch(()=>{ alert("Error sending data. Try again."); });
    } else {
      alert("We couldn’t verify that you are at the event venue.");
      retry.style.display = "inline-block";
    }
  }

  function fail(){
    alert("Enable location services and try again.");
    retry.style.display = "inline-block";
  }
}

// -----------------------
checkAccess();
setInterval(checkAccess, 30000);
</script>

</body>
</html>
