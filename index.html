<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BFD Shanghai 26 Check-In</title>

<style>
body { font-family: Arial; text-align: center; margin-top: 50px; background:#f9f9f9; }
.logo { max-width:150px; margin-bottom:20px; }
input, button { padding:10px; margin:10px; width:220px; border-radius:5px; }
button { background:#3498db; color:white; border:none; cursor:pointer; }
</style>
</head>

<body>

<div id="paused" style="display:none;"></div>

<div id="app">
  <img class="logo" src="https://242329549.fs1.hubspotusercontent-na2.net/hubfs/242329549/crm-properties-file-values/Shanghai%20Final%20Logo.png">

  <h1>BFD Shanghai 26 Check-In</h1>
  <h2>April 11, 2026</h2>

  <form id="form">
    <input type="text" id="fname" placeholder="First Name" required>
    <input type="text" id="lname" placeholder="Last Name" required><br>
    <button type="submit">Continue</button>
  </form>

  <p id="status"></p>
</div>

<script>
// =======================
// CONFIG
// =======================
const webhookURL = "https://hook.eu1.make.com/pdz3obto9me2epspeq6iyq3yfjh5o1ou";

// =======================
// SCHEDULE (SHANGHAI TIME)
// =======================
const eventSchedule = [
  { day: 1, date:"2026-04-11", start:{hour:7,minute:0}, end:{hour:14,minute:0} },
  { day: 2, date:"2026-04-12", start:{hour:7,minute:0}, end:{hour:14,minute:0} }
];

let currentEvent = null;

// =======================
// SHANGHAI TIME HELPERS
// =======================
function getShanghaiNow(){
    return new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Shanghai" }));
}

function getShanghaiDateString(d){
    return d.toLocaleDateString("en-CA", { timeZone: "Asia/Shanghai" });
}

function getMinutes(d){
    return d.getHours() * 60 + d.getMinutes();
}

function formatDate(dateStr){
    return new Date(dateStr).toLocaleDateString("en-US", {
        year: "numeric",
        month: "long",
        day: "numeric"
    });
}

function formatTime(mins){
    const h = Math.floor(mins / 60);
    const m = mins % 60;
    const ampm = h >= 12 ? "PM" : "AM";
    const h12 = h % 12 || 12;
    return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
}

// =======================
// ACCESS CONTROL
// =======================
function checkAccess(){

    const sh = getShanghaiNow();
    const today = getShanghaiDateString(sh);
    const nowMinutes = getMinutes(sh);

    currentEvent = eventSchedule.find(e => e.date === today);

    // -----------------------
    // NO EVENT TODAY → SHOW NEXT
    // -----------------------
    if(!currentEvent){

        const upcoming = eventSchedule
            .map(e => {
                const startMinutes = e.start.hour * 60 + e.start.minute;

                return {
                    ...e,
                    isFuture:
                        (e.date > today) ||
                        (e.date === today && startMinutes > nowMinutes)
                };
            })
            .filter(e => e.isFuture)
            .sort((a,b) =>
                a.date.localeCompare(b.date) ||
                (a.start.hour*60 + a.start.minute) - (b.start.hour*60 + b.start.minute)
            )[0];

        if(upcoming){
            const start = upcoming.start.hour*60 + upcoming.start.minute;
            const end = upcoming.end.hour*60 + upcoming.end.minute;

            block(`Check-in will be available on ${formatDate(upcoming.date)} from ${formatTime(start)} - ${formatTime(end)} (Shanghai Time).`);
        } else {
            block("Check-in is now closed. Thank you!");
        }

        return;
    }

    // -----------------------
    // EVENT FOUND → CHECK TIME WINDOW
    // -----------------------
    const start = currentEvent.start.hour * 60 + currentEvent.start.minute;
    const end = currentEvent.end.hour * 60 + currentEvent.end.minute;

    if(nowMinutes >= start && nowMinutes < end){
        document.getElementById("app").style.display = "block";
        document.getElementById("paused").style.display = "none";
    } else {
        block(`Available on ${formatDate(currentEvent.date)}, ${formatTime(start)} - ${formatTime(end)} (Shanghai Time).`);
    }
}

// =======================
// BLOCK UI
// =======================
function block(msg){
    document.getElementById("app").style.display = "none";
    const p = document.getElementById("paused");
    p.style.display = "block";
    p.innerHTML = `
        <h1>We’re currently between sessions.</h1>
        <h3>We’ll be ready to greet you soon!</h3>
        <p>${msg}</p>
    `;
}

// =======================
// FORM SUBMIT (UTC TIMESTAMP)
// =======================
document.getElementById("form").addEventListener("submit", e => {
    e.preventDefault();

    const fname = document.getElementById("fname").value.trim();
    const lname = document.getElementById("lname").value.trim();

    if(!fname || !lname){
        alert("Enter name");
        return;
    }

    document.getElementById("status").textContent = "Submitting...";

    fetch(webhookURL,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            fname,
            lname,
            day: currentEvent?.day,
            action: "check-in",
            timestamp: new Date().toISOString() // UTC
        })
    })
    .then(()=>{
        document.body.innerHTML = `<h1>Check-In Complete</h1><p>Thank you ${fname} ${lname}!</p>`;
    })
    .catch(()=>{
        alert("Error. Try again.");
        document.getElementById("status").textContent = "";
    });
});

// =======================
checkAccess();
setInterval(checkAccess, 30000);
</script>

</body>
</html>
